    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Montserrat', sans-serif; }
        
        /* Cores Oficiais USA */
        .usa-blue { background-color: #0A3161; }
        .usa-red { background-color: #B31942; }
        .text-usa-red { color: #B31942; }
        .text-usa-blue { color: #0A3161; }
        
        .cta-pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(179, 25, 66, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(179, 25, 66, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(179, 25, 66, 0); }
        }

        /* Background da Bandeira Americana Sutil */
        .flag-bg {
            position: relative;
            background-color: #0A3161;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.05) 0%, transparent 10%),
                radial-gradient(circle at 40% 10%, rgba(255, 255, 255, 0.05) 0%, transparent 10%),
                radial-gradient(circle at 10% 80%, rgba(255, 255, 255, 0.05) 0%, transparent 10%),
                radial-gradient(circle at 80% 40%, rgba(255, 255, 255, 0.05) 0%, transparent 10%),
                linear-gradient(rgba(10, 49, 97, 0.85), rgba(10, 49, 97, 0.95)),
                url('https://images.unsplash.com/photo-1508433957232-3107f5ed2035?q=80&w=2000&auto=format&fit=crop'); /* Imagem real da bandeira em low opacity */
            background-size: 50px 50px, 60px 60px, 55px 55px, 45px 45px, cover, cover;
            background-position: 0 0, 0 0, 0 0, 0 0, center, center;
            background-blend-mode: screen, screen, screen, screen, multiply, normal;
        }

        /* Camada extra de listras sutis */
        .flag-bg::after {
            content: "";
            position: absolute;
            inset: 0;
            background-image: linear-gradient(0deg, rgba(255, 255, 255, 0.03) 50%, transparent 50%);
            background-size: 100% 80px;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes slideUp {
            from { transform: translateY(100%) translateX(-50%); opacity: 0; }
            to { transform: translateY(0) translateX(-50%); opacity: 1; }
        }
        .animate-slideUp { animation: slideUp 0.5s ease-out forwards; }
        
        .animate-bounce-slow {
            animation: bounce-slow 3s infinite;
        }
        @keyframes bounce-slow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
